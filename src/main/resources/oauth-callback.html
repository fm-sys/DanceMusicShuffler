<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      text-align: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem;
      max-width: 32rem;
    }

    .logo {
      width: 6rem;
      height: 6rem;
      flex: 0 0 auto;
    }

    .logo svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.88);
    }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="App Logo">
        <g transform="translate(0.000000,48.000000) scale(0.100000,-0.100000)" fill="#1ed760" stroke="none">
          <path d="M140 465 c-26 -32 13 -81 48 -59 22 14 27 41 12 59 -16 19 -44 19 -60 0z"/>
          <path d="M285 447 c-10 -8 -16 -23 -13 -38 4 -29 43 -37 73 -16 17 13 17 17 5 31 -23 29 -46 36 -65 23z"/>
          <path d="M122 378 c-8 -8 -12 -49 -12 -117 0 -92 -3 -114 -27 -169 -19 -46 -23 -66 -15 -74 13 -13 70 70 79 116 5 26 7 27 17 10 6 -11 13 -46 16 -79 4 -44 9 -60 20 -60 23 0 25 104 4 168 -10 29 -17 65 -16 81 2 18 -6 38 -20 53 -17 18 -19 26 -10 35 10 10 20 8 47 -7 27 -14 38 -16 47 -7 7 7 17 12 22 12 6 0 0 -9 -13 -19 -24 -18 -25 -18 -58 1 -21 13 -33 16 -33 8 0 -17 42 -49 66 -50 24 0 89 64 80 79 -10 16 -47 14 -66 -4 -15 -13 -20 -12 -50 10 -37 28 -60 31 -78 13z"/>
          <path d="M285 290 c-10 -11 -24 -20 -32 -20 -7 0 -18 -12 -23 -26 -12 -32 -1 -214 13 -214 5 0 4 -7 -3 -15 -16 -20 7 -21 35 -2 11 7 40 19 64 26 39 11 45 11 53 -3 5 -9 14 -14 19 -11 6 4 6 13 0 23 -7 12 -1 23 22 45 l32 29 -46 23 c-66 34 -122 99 -117 136 5 34 6 34 -17 9z"/>
        </g>
      </svg>
    </div>

    <div>
      <h1>{{TITLE}}</h1>
      <p id="message">{{MESSAGE}}</p>
    </div>
  </main>

  {{AUTO_CLOSE_SCRIPT}}
</body>
</html>
